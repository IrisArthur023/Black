<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Query-LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fffbf2; color: #3e2723; font-family: 'DM Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(230, 223, 209, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-[#ffb300]/10 blur-[120px] rounded-full -mr-48 -mt-48"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-[#5d4037]/5 blur-[120px] rounded-full -ml-48 -mb-48"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <a href="Homepage.HTML" class="inline-flex items-center gap-2 mb-6 group">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm border border-[#e6dfd1] group-hover:border-[#ffb300] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                </div>
                <span class="text-sm font-bold uppercase tracking-widest text-[#7d6e67]">Back to Home</span>
            </a>
            <h1 class="font-['Syne'] text-4xl font-extrabold mb-2">Welcome Back.</h1>
            <p class="text-[#7d6e67]">Continue your journey of curiosity.</p>
        </div>

        <div class="glass p-8 md:p-10 rounded-[40px] shadow-2xl shadow-[#5d4037]/5">
            <form class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-[#5d4037] mb-2 ml-1">Email Address</label>
                    <input type="email" placeholder="alex@example.com" class="w-full bg-[#fcf9f2] border border-[#e6dfd1] rounded-2xl px-6 py-4 outline-none focus:border-[#ffb300] transition-colors">
                </div>
                <div>
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="block text-xs font-bold uppercase tracking-widest text-[#5d4037]">Password</label>
                        <a href="#" class="text-xs font-bold text-[#ffb300] hover:underline">Forgot?</a>
                    </div>
                    <input type="password" placeholder="••••••••" class="w-full bg-[#fcf9f2] border border-[#e6dfd1] rounded-2xl px-6 py-4 outline-none focus:border-[#ffb300] transition-colors">
                </div>

                <button type="submit" class="w-full bg-[#3e2723] text-white font-bold py-4 rounded-2xl hover:bg-[#ffb300] transition-all transform hover:-translate-y-1 shadow-xl shadow-[#3e2723]/10">
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-[#e6dfd1] text-center">
                <p class="text-[#7d6e67] text-sm mb-4">Or sign in with</p>
                <div class="flex gap-4">
                    <button class="flex-1 flex items-center justify-center gap-2 bg-white border border-[#e6dfd1] py-3 rounded-xl hover:bg-[#fcf9f2] transition-colors">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
                        <span class="text-sm font-bold">Google</span>
                    </button>
                  
                </div>
            </div>
        </div>

        <p class="text-center mt-8 text-[#7d6e67] text-sm">
            Don't have an account? <a href="#" class="text-[#ffb300] font-bold hover:underline">Create an account</a>
        </p>
    </div>
</body>
</html>
